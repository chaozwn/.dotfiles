# Yazi 26+ theme (see https://yazi-rs.github.io/docs/configuration/theme/)
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[mgr]
# NOTE: can combined with tmTheme (sublime colorshceme file) for preview code highlight
# syntect_theme = "path/to/tmTheme"

cwd = { fg = "#828bb8", italic = true }

# Find
find_keyword  = { fg = "#1e2030", bg = "#ff966c", bold = true }
find_position = { fg = "#0db9d7", bg = "#203346", bold = true }

# Marker
marker_copied   = { fg = "#4fd6be", bg = "#4fd6be" }
marker_cut      = { fg = "#ff757f", bg = "#ff757f" }
marker_marked   = { fg = "#c099ff", bg = "#c099ff" }
marker_selected = { fg = "#82aaff", bg = "#82aaff" }

# Count
count_copied   = { fg = "#c8d3f5", bg = "#41a6b5" }
count_cut      = { fg = "#c8d3f5", bg = "#c53b53" }
count_selected = { fg = "#c8d3f5", bg = "#3e68d7" }

# Border
border_symbol = "│"
border_style  = { fg = "#589ed7" }

# Moved from [mgr] in older Yazi: hovered / preview_hovered
[indicator]
parent  = {}
current = { bg = "#2f334d" }
preview = { bg = "#2f334d" }

[tabs]
active   = { fg = "#c8d3f5", bg = "#2f334d" }
inactive = { fg = "#3b4261", bg = "#222436" }

# Mode (was under [status] in pre-26 themes)
[mode]
normal_main = { fg = "#1e2030", bg = "#82aaff", bold = true }
normal_alt  = { fg = "#82aaff", bg = "#222436" }
select_main = { fg = "#1e2030", bg = "#c099ff", bold = true }
select_alt  = { fg = "#c099ff", bg = "#222436" }
unset_main  = { fg = "#1e2030", bg = "#fca7ea", bold = true }
unset_alt   = { fg = "#fca7ea", bg = "#222436" }

[status]
perm_sep   = { fg = "#444a73" }
perm_type  = { fg = "#82aaff" }
perm_read  = { fg = "#ffc777" }
perm_write = { fg = "#ff757f" }
perm_exec  = { fg = "#c3e88d" }

progress_label  = { fg = "#828bb8", bold = true }
progress_normal = { fg = "#222436" }
progress_error  = { fg = "#ff757f" }

[pick]
border   = { fg = "#589ed7" }
active   = { fg = "#c8d3f5", bg = "#2d3f76" }
inactive = { fg = "#c8d3f5" }

[input]
border   = { fg = "#0db9d7" }
title    = {}
value    = { fg = "#fca7ea" }
selected = { bg = "#2d3f76" }

[cmp]
border   = { fg = "#0db9d7" }
active   = { fg = "#c8d3f5", bg = "#2d3f76" }
inactive = { fg = "#c8d3f5" }

[tasks]
border  = { fg = "#589ed7" }
title   = {}
hovered = { fg = "#c8d3f5", bg = "#2d3f76" }

[which]
cols = 3
mask            = { bg = "#1e2030" }
cand            = { fg = "#86e1fc" }
rest            = { fg = "#82aaff" }
desc            = { fg = "#c099ff" }
separator       = "  "
separator_style = { fg = "#636da6" }

[notify]
title_info  = { fg = "#0db9d7" }
title_warn  = { fg = "#ffc777" }
title_error = { fg = "#ff757f" }

[help]
on      = { fg = "#c3e88d" }
run     = { fg = "#c099ff" }
hovered = { bg = "#2d3f76" }
footer  = { fg = "#c8d3f5", bg = "#222436" }

[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#ffc777" },

	# Media
	{ mime = "{audio,video}/*", fg = "#c099ff" },

	# Archives
	{ mime = "application/*zip", fg = "#ff757f" },
	{ mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#ff757f" },

	# Documents
	{ mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#86e1fc" },

	# Special files
	{ url = "*", is = "orphan", bg = "#ff757f" },
	{ url = "*", is = "exec", fg = "#c3e88d" },

	# Fallback (was `name` in older themes; use `url` in Yazi 26+)
	{ url = "*/", fg = "#82aaff" },
	{ url = "*", fg = "#c8d3f5" },
]
