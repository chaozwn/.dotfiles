- defaults:
    link:
      create: true
      force: true
      relink: true

- clean: ["~"]

# No trailing slash on link paths: Python os.path.islink(".../dir/") is false for symlinks,
# which breaks dotbot relink and triggers "appears to be the same file" errors.
- link:
    ~/.config/starship.toml: ./starship/starship.toml
    ~/.config/fish: ./fish
    ~/.config/kitty: ./kitty
    ~/.config/yazi: ./yazi
    ~/.config/tmux: ./tmux
    ~/.config/nvim: ./lazyvim
    ~/.config/fastfetch: ./fastfetch
    ~/.config/lazygit: ./lazygit
    ~/.config/glow: ./glow
    ~/.config/sketchybar: ./sketchybar
    ~/.config/borders: ./borders
    ~/.config/skhd: ./skhd
    ~/.config/yabai: ./yabai
    ~/.config/ghostty: ./ghostty
    ~/.config/niri: ./niri
    ~/.local/share/flatpak/overrides: ./flatpak/overrides

    # --- Rime (Linux fcitx5) ---
    # Layer ./rime/*.custom.yaml + ./rime/lua/*.lua on top of an existing
    # rime-ice user dir (cloned by scripts/install_rime.sh). Skipped if the
    # rime user dir is not present (e.g. fcitx5/rime not installed yet).
    ~/.local/share/fcitx5/rime/rime.lua:
      path: ./rime/rime.lua
      if: '[ "$(uname)" = "Linux" ] && [ -d "$HOME/.local/share/fcitx5/rime" ]'
    ~/.local/share/fcitx5/rime:
      path: ./rime/*.custom.yaml
      glob: true
      if: '[ "$(uname)" = "Linux" ] && [ -d "$HOME/.local/share/fcitx5/rime" ]'
    ~/.local/share/fcitx5/rime/lua:
      path: ./rime/lua/*.lua
      glob: true
      if: '[ "$(uname)" = "Linux" ] && [ -d "$HOME/.local/share/fcitx5/rime/lua" ]'

    # --- Rime (Linux ibus, fallback) ---
    ~/.config/ibus/rime/rime.lua:
      path: ./rime/rime.lua
      if: '[ "$(uname)" = "Linux" ] && [ -d "$HOME/.config/ibus/rime" ] && [ ! -d "$HOME/.local/share/fcitx5/rime" ]'
    ~/.config/ibus/rime:
      path: ./rime/*.custom.yaml
      glob: true
      if: '[ "$(uname)" = "Linux" ] && [ -d "$HOME/.config/ibus/rime" ] && [ ! -d "$HOME/.local/share/fcitx5/rime" ]'
    ~/.config/ibus/rime/lua:
      path: ./rime/lua/*.lua
      glob: true
      if: '[ "$(uname)" = "Linux" ] && [ -d "$HOME/.config/ibus/rime/lua" ] && [ ! -d "$HOME/.local/share/fcitx5/rime/lua" ]'

    # --- Rime (macOS Squirrel) ---
    "~/Library/Rime/rime.lua":
      path: ./rime/rime.lua
      if: '[ "$(uname)" = "Darwin" ] && [ -d "$HOME/Library/Rime" ]'
    "~/Library/Rime":
      path: ./rime/*.custom.yaml
      glob: true
      if: '[ "$(uname)" = "Darwin" ] && [ -d "$HOME/Library/Rime" ]'
    "~/Library/Rime/lua":
      path: ./rime/lua/*.lua
      glob: true
      if: '[ "$(uname)" = "Darwin" ] && [ -d "$HOME/Library/Rime/lua" ]'

    # --- Cursor (macOS) ---
    "~/Library/Application Support/Cursor/User/settings.json":
      path: ./cursor/settings.json
      if: '[ "$(uname)" = "Darwin" ]'
    "~/Library/Application Support/Cursor/User/keybindings.json":
      path: ./cursor/keybindings.json
      if: '[ "$(uname)" = "Darwin" ]'
    "~/Library/Application Support/Cursor/User/snippets":
      path: ./cursor/snippets
      if: '[ "$(uname)" = "Darwin" ]'

    # --- Cursor (Linux) ---
    ~/.config/Cursor/User/settings.json:
      path: ./cursor/settings.json
      if: '[ "$(uname)" = "Linux" ]'
    ~/.config/Cursor/User/keybindings.json:
      path: ./cursor/keybindings.json
      if: '[ "$(uname)" = "Linux" ]'
    ~/.config/Cursor/User/snippets:
      path: ./cursor/snippets
      if: '[ "$(uname)" = "Linux" ]'

    # --- VSCode (macOS) ---
    "~/Library/Application Support/Code/User/settings.json":
      path: ./vscode/settings.json
      if: '[ "$(uname)" = "Darwin" ]'
    "~/Library/Application Support/Code/User/keybindings.json":
      path: ./vscode/keybindings.json
      if: '[ "$(uname)" = "Darwin" ]'
    "~/Library/Application Support/Code/User/snippets":
      path: ./vscode/snippets
      if: '[ "$(uname)" = "Darwin" ]'

    # --- VSCode (Linux) ---
    ~/.config/Code/User/settings.json:
      path: ./vscode/settings.json
      if: '[ "$(uname)" = "Linux" ]'
    ~/.config/Code/User/keybindings.json:
      path: ./vscode/keybindings.json
      if: '[ "$(uname)" = "Linux" ]'
    ~/.config/Code/User/snippets:
      path: ./vscode/snippets
      if: '[ "$(uname)" = "Linux" ]'

- shell:
    - git submodule sync --recursive
    - git submodule update --init --recursive --remote
