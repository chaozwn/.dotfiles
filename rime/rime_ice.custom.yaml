# Patch rime-ice's main schema (rime_ice) to support cross-platform vim_mode
# via lua_processor. See ./lua/vim_mode.lua and rime/README.md.
#
# `vmode` is ON by default (reset: 1). Some Wayland shells (DMS / Quickshell)
# can create transient input contexts with unstable app ids after restart, so
# the vim-mode processor should not depend on per-app app_options to stay on.

patch:
  # Insert the lua processor right after select_character (index 0),
  # before ascii_composer / key_binder, so we can intercept Esc / i a o c
  # before any other binding consumes them.
  engine/processors/@before 1: lua_processor@vim_mode

  switches/+:
    - name: vmode
      states: [ NoVim, Vim ]
      reset: 1
