# Linux fcitx5-rime patches.
#
# IMPORTANT: open the fcitx5 config tool and set
#   Global Options -> Shared Input State = No
# Otherwise app_options are not re-applied when switching apps.
#
# To find an app's identifier, run:
#   dbus-send --print-reply=literal --dest=org.fcitx.Fcitx5 \
#     /controller org.fcitx.Fcitx.Controller1.DebugInfo
#
# rime_ice enables vmode by default; explicit vmode entries here keep common
# editor/shell app ids aligned while per-app options handle ASCII defaults.

patch:
  app_options/+:
    # ── DMS / Quickshell overlays ──────────────────────────────
    # DMS can create transient Wayland input contexts after restart; keep
    # known shell ids in vmode so focusing overlays does not disable it.
    dms:
      ascii_mode: true
      ascii_punct: true
      vmode: true
    quickshell:
      ascii_mode: true
      ascii_punct: true
      vmode: true

    # ── Terminals where I use vim/nvim heavily ────────────────
    kitty:
      ascii_mode: true
      ascii_punct: true
      vmode: true
    com.mitchellh.ghostty:
      ascii_mode: true
      ascii_punct: true
      vmode: true
    org.alacritty:
      ascii_mode: true
      ascii_punct: true
      vmode: true
    Alacritty:
      ascii_mode: true
      ascii_punct: true
      vmode: true

    # ── IDEs / editors that start in ASCII ────────────────────
    code:
      ascii_mode: true
      ascii_punct: true
      vmode: true
    code-url-handler:
      ascii_mode: true
      ascii_punct: true
      vmode: true
    cursor:
      ascii_mode: true
      ascii_punct: true
      vmode: true
    Cursor:
      ascii_mode: true
      ascii_punct: true
      vmode: true
    jetbrains-idea:
      vmode: true
    jetbrains-datagrip:
      vmode: true
    jetbrains-webstorm:
      vmode: true

    # ── Notes / writing ───────────────────────────────────────
    obsidian:
      vmode: true
